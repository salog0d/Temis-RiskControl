global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "temis-riskcontrol"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: temis-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
