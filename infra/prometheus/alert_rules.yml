groups:
  - name: temis.backend
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="temis-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Temis backend is down"
          description: "The backend service has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="temis-backend", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="temis-backend"}[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5% of requests are returning 5xx errors (current: {{ $value | humanizePercentage }})."

      - alert: HighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket{job="temis-backend"}[5m])) by (le, handler)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 request latency"
          description: "p95 latency on {{ $labels.handler }} has exceeded 2 s for 5 minutes (current: {{ $value | humanizeDuration }})."

      - alert: HighRequestRate
        expr: sum(rate(http_requests_total{job="temis-backend"}[1m])) > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Unusually high request throughput"
          description: "Backend is receiving more than 500 req/s (current: {{ $value | humanize }})."
